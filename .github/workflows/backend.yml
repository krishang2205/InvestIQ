name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  FLASK_ENV: testing
  SUPABASE_URL: "http://mock-url"
  SUPABASE_KEY: "mock-key"
  GEMINI_API_KEY: "mock"
  OPENAI_API_KEY: "mock-openai-key-disabled"
  WORKER_THREADS: "5"
  PYTHON_VERSION: "3.10"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip' # Automatically caches dependencies for faster builds
        
    - name: Initialize Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov flake8 black
        
    - name: Validate Code Formatting (Black)
      run: |
        # Assert that the entire backend conforms to PEP8 standard formatting
        black --check .
        
    - name: Static Analysis (Flake8)
      run: |
        # stop the build if there are critical Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all other stylistic or complexity errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        
    - name: Execute Pytest Suite with Coverage
      run: |
        # Run all unit tests and generate a coverage report for the CI dashboard
        pytest -v tests/ --cov=./ --cov-report=xml
