version: '3.8'

# This file represents the absolute Production network bindings for InvestIQ.
# It omits exposed ports that shouldn't leak to public IP boundaries 
# (e.g., Redis is contained solely within the virtual network).

services:
  investiq-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: investiq-backend:latest
    restart: unless-stopped
    ports:
      # Map container 5001 to host 8000 (usually picked up by Nginx proxy)
      - "8000:5001"
    environment:
      # Application Configuration Overrides
      - FLASK_ENV=production
      - LOG_LEVEL=info
      
      # Database Connections 
      # (Ideally these are passed via external secret managers in AWS/GCP)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASS}
      - POSTGRES_DB=${PG_DB}
      - POSTGRES_HOST=investiq-db
      
      # AI Telemetry
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # Queue Connectivity
      - REDIS_URL=redis://investiq-cache:6379/0
    
    depends_on:
      investiq-cache:
        condition: service_healthy
    networks:
      - internal-vpc
      - public-gateway

  investiq-cache:
    image: redis:7.2-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal-vpc

volumes:
  redis-data:
    driver: local

networks:
  internal-vpc:
    driver: bridge # Secure isolated network for backend-to-cache messaging
  public-gateway:
    driver: bridge # Edge network connected to Nginx or Load Balancers
